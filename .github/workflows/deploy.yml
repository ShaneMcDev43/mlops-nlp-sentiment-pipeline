name: Docker Build

on:
  push:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mlops-nlp-api .